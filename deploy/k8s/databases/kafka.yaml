# Single-node KRaft Kafka (no ZooKeeper). The node pool owns replicas +
# storage; the Kafka CR owns listeners/config. Inter-service traffic
# uses the internal plaintext listener on the bootstrap service
# `cargo-kafka-bootstrap:9092` (matches KAFKA_BOOTSTRAP_SERVERS in the
# tracking/notification Deployments and the Debezium worker).
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: cargo
  labels:
    strimzi.io/cluster: cargo
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi
        deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cargo
  namespace: cargo
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # Must be a version the installed operator (Strimzi 1.0.1) supports —
    # that build ships only Kafka 4.1.0 (KRaft-only). metadataVersion is
    # left to the operator default for this version.
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
