# Layer 3 — our workloads. Shipment/Tracking/Notification gRPC
# services, Envoy edge, Keycloak, web UI, and the Debezium Connect
# worker + connector registration. Depends on databases (the services
# read the CNPG-generated DB secret and the Kafka bootstrap service).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: databases
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/apps/overlays/dev
  prune: true
  wait: false
