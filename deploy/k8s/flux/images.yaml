# Image automation CRs (ImageRepository/ImagePolicy/ImageUpdateAutomation).
# Independent of the infraâ†’databasesâ†’apps chain â€” it only needs the image
# controllers, which the FluxInstance always installs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: images
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/image-automation
  prune: true
  wait: true
