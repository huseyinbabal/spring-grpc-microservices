# Observability stack — Prometheus/Grafana, Tempo, Loki/Promtail, plus the
# PodMonitors + dashboards. Independent of the cargo workload; wait:false so
# the large Helm installs don't block. The PodMonitor inside applies once
# the Prometheus-operator CRDs land (Flux retries until then).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 25m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/monitoring
  prune: true
  wait: false
