# Layer 1 — operators. Installs CloudNativePG and Strimzi via Helm.
# `wait: true` blocks until the HelmReleases are Ready, so by the time
# the `databases` Kustomization runs, the Cluster/Kafka CRDs exist.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 8m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/infrastructure
  prune: true
  wait: true
