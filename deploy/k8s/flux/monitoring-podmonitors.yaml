# PodMonitors for our workloads. Separate from `monitoring` because the
# PodMonitor CRD is installed by that layer's Helm stack — dependsOn keeps
# Flux from dry-run-failing on a CRD that doesn't exist yet.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-podmonitors
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/monitoring/podmonitors
  prune: true
  wait: false
