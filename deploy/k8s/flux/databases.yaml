# Layer 2 — stateful backends. CNPG Postgres Clusters (shipment +
# tracking) and the Strimzi Kafka cluster + topics. Depends on the
# operators being Ready (their CRDs must be registered first).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./deploy/k8s/databases
  prune: true
  wait: true
