# Strimzi Kafka operator — manages the Kafka cluster + KafkaTopics under
# deploy/k8s/databases/kafka. watchAnyNamespace lets it reconcile the
# Kafka CRs in the `cargo` namespace from its home in strimzi-system.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: strimzi
  namespace: flux-system
spec:
  interval: 1h
  url: https://strimzi.io/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-kafka-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: strimzi
  targetNamespace: strimzi-system
  # The operator image (quay.io/strimzi/operator) is large; on a slow
  # link the pull exceeds Helm's default 5m timeout, so Flux would keep
  # rolling back and re-pulling. Give it room to finish in one attempt.
  timeout: 15m
  chart:
    spec:
      chart: strimzi-kafka-operator
      # Pinned: this build ships Kafka 4.1.0, which databases/kafka.yaml
      # targets. Bumping it may change the supported Kafka version.
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    watchAnyNamespace: true
