# Strimzi Kafka operator — manages the Kafka cluster + KafkaTopics under
# deploy/k8s/databases/kafka. watchAnyNamespace lets it reconcile the
# Kafka CRs in the `cargo` namespace from its home in strimzi-system.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: strimzi
  namespace: flux-system
spec:
  interval: 1h
  url: https://strimzi.io/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-kafka-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: strimzi
  targetNamespace: strimzi-system
  chart:
    spec:
      chart: strimzi-kafka-operator
      # Floating range → latest tested patch. Pin exactly for prod;
      # `helm search repo strimzi/strimzi-kafka-operator --versions`.
      version: ">=0.43.0"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    watchAnyNamespace: true
