# CloudNativePG operator — manages the two Postgres Clusters declared
# under deploy/k8s/databases/postgres. Watches all namespaces by default.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 1h
  releaseName: cnpg
  targetNamespace: cnpg-system
  chart:
    spec:
      chart: cloudnative-pg
      # Pinned to the tested version (operator 1.26.x).
      version: "0.28.3"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
