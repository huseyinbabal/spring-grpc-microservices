# Scrapes the three Spring services' Micrometer metrics straight off the
# pods (management port 8081 / actuator/prometheus). A PodMonitor (not
# ServiceMonitor) so notification — which has no Service — is covered too.
#
# Lives in its own Flux Kustomization (dependsOn: monitoring) because the
# PodMonitor CRD ships with kube-prometheus-stack; keeping it here lets the
# Helm stack install first instead of failing the whole apply on a missing CRD.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cargo-services
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames: [cargo]
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [shipment, tracking, notification]
  podMetricsEndpoints:
    - port: mgmt
      path: /actuator/prometheus
      interval: 15s
