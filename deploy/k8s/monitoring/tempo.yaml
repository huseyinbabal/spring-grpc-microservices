# Tempo (single binary) — trace backend. Accepts OTLP from the Spring
# services (HTTP :4318) and from Envoy (gRPC :4317). The metrics-generator
# derives service-graph + span (RED) metrics from spans and remote-writes
# them to Prometheus, which Grafana's Tempo datasource reads to draw the
# Service Graph.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: flux-system
spec:
  interval: 1h
  timeout: 15m
  releaseName: tempo
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: tempo
      version: ">=1.10.0"   # pin exactly for prod
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    tempo:
      # OTLP receivers (exposed on the tempo Service for in-cluster senders).
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
      # Derive RED + service-graph metrics and push to Prometheus.
      metricsGenerator:
        enabled: true
        remoteWriteUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      # Enable the generator processors for the default tenant. Without
      # this, overrides.defaults stays empty and no service-graph/span
      # metrics are produced (the value path is tempo.overrides.defaults).
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
