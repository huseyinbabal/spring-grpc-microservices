# Promtail DaemonSet — scrapes container logs on every node and pushes to
# Loki. (Same role as the promtail service in compose.)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  interval: 1h
  timeout: 10m
  releaseName: promtail
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  chart:
    spec:
      chart: promtail
      version: ">=6.16.0"   # pin exactly for prod
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    config:
      clients:
        - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
