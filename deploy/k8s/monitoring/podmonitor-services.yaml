# Scrapes the three Spring services' Micrometer metrics straight off the
# pods (the management port 8081 / actuator/prometheus). A PodMonitor (not
# ServiceMonitor) so notification — which has no Service — is covered too.
# Prometheus picks this up because the stack disables the helm-label
# selector (selects all PodMonitors cluster-wide).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cargo-services
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames: [cargo]
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [shipment, tracking, notification]
  podMetricsEndpoints:
    - port: mgmt
      path: /actuator/prometheus
      interval: 15s
