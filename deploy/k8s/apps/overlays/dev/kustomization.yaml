# Dev environment overlay. Pins every workload into the `cargo`
# namespace and stamps the image tags. Promotion to another env = a
# sibling overlay with different newTag / replica patches; the same
# image bytes flow through (see session-07 slides "promotion across envs").
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cargo
resources:
  - ../../base
# The `$imagepolicy` markers are rewritten in-place by Flux's
# ImageUpdateAutomation (see deploy/k8s/image-automation). `newTag: main`
# is the bootstrap value; once a `main-<ts>` build exists, automation
# swaps it to the newest one and commits the change back to main.
images:
  - name: ghcr.io/huseyinbabal/cargo-shipment
    newTag: main # {"$imagepolicy": "flux-system:shipment:tag"}
  - name: ghcr.io/huseyinbabal/cargo-tracking
    newTag: main # {"$imagepolicy": "flux-system:tracking:tag"}
  - name: ghcr.io/huseyinbabal/cargo-notification
    newTag: main # {"$imagepolicy": "flux-system:notification:tag"}
  - name: ghcr.io/huseyinbabal/cargo-web
    newTag: main # {"$imagepolicy": "flux-system:web:tag"}
