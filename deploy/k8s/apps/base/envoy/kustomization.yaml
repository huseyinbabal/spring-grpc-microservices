apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  # K8s-specific Envoy config (adds OpenTelemetry tracing → Tempo). Same
  # routes + mTLS upstreams as Compose; clusters resolve `shipment`/
  # `tracking` by k8s DNS in this namespace.
  - name: envoy-config
    files:
      - envoy.yaml
