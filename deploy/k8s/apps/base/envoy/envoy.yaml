# Kubernetes Envoy config — same gRPC-Web edge + mTLS upstreams as the
# Compose envoy.yaml, PLUS OpenTelemetry tracing. Envoy opens the root
# span for every browser request and propagates W3C `traceparent` to the
# upstream gRPC service, so the whole web → envoy → grpc → kafka path
# lands in a single Tempo trace. (Kept separate from deploy/envoy/envoy.yaml
# because the trace collector address differs: tempo.monitoring here.)
static_resources:
  listeners:
    - name: grpc_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                generate_request_id: true
                # Trace every request (demo) and export to Tempo over OTLP.
                tracing:
                  random_sampling: { value: 100 }
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      service_name: cargo-envoy
                      grpc_service:
                        envoy_grpc: { cluster_name: opentelemetry_collector }
                        timeout: 0.250s
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: grpc_services
                      domains: ["*"]
                      routes:
                        - match: { prefix: /cargo.shipment.v1.ShipmentService/ }
                          route: { cluster: shipment }
                        - match: { prefix: /cargo.tracking.v1.TrackingService/ }
                          route: { cluster: tracking }
                      cors:
                        allow_origin_string_match:
                          - prefix: "*"
                        allow_methods: "GET, PUT, DELETE, POST, OPTIONS"
                        # traceparent/tracestate added so browser-originated
                        # W3C context (if any) is allowed through to Envoy.
                        allow_headers: "keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization,traceparent,tracestate"
                        expose_headers: "grpc-status,grpc-message"
                        max_age: "1728000"
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # OTLP/gRPC sink for Envoy's spans → Tempo distributor.
    - name: opentelemetry_collector
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: opentelemetry_collector
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: tempo.monitoring.svc.cluster.local
                      port_value: 4317

    - name: shipment
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: shipment
          common_tls_context:
            tls_certificates:
              - certificate_chain: { filename: /etc/cargo/tls/client.crt }
                private_key: { filename: /etc/cargo/tls/client.key }
            validation_context:
              trusted_ca: { filename: /etc/cargo/tls/ca.crt }
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher: { exact: shipment }
      load_assignment:
        cluster_name: shipment
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: shipment, port_value: 9090 }

    - name: tracking
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: tracking
          common_tls_context:
            tls_certificates:
              - certificate_chain: { filename: /etc/cargo/tls/client.crt }
                private_key: { filename: /etc/cargo/tls/client.key }
            validation_context:
              trusted_ca: { filename: /etc/cargo/tls/ca.crt }
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher: { exact: tracking }
      load_assignment:
        cluster_name: tracking
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: tracking, port_value: 9090 }
