apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment
  labels:
    app: shipment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipment
  template:
    metadata:
      labels:
        app: shipment
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: shipment
          image: ghcr.io/huseyinbabal/cargo-shipment
          ports:
            - { name: grpc, containerPort: 9090 }
            - { name: mgmt, containerPort: 8081 }
          env:
            - name: SHIPMENT_DB_URL
              value: jdbc:postgresql://postgres-shipment-rw:5432/shipment
            - name: SHIPMENT_DB_USER
              value: shipment
            # Password is generated by CloudNativePG into the
            # `postgres-shipment-app` secret (key: password).
            - name: SHIPMENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-shipment-app
                  key: password
            - name: CARGO_AUTH_ENABLED
              value: "true"
            - name: CARGO_AUTH_JWKS_URI
              value: http://keycloak:8080/realms/cargo/protocol/openid-connect/certs
            # Session 08 deploys Tempo; until then OTLP export is a no-op.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.cargo.svc.cluster.local:4318/v1/traces
          volumeMounts:
            - name: tls
              mountPath: /etc/cargo/tls
              readOnly: true
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: mgmt }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: mgmt }
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits:   { cpu: "1",  memory: 768Mi }
      volumes:
        - name: tls
          secret:
            secretName: cargo-tls
