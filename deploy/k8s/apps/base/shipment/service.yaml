# Name MUST be `shipment` — the mTLS server cert SAN is `shipment`, and
# Envoy/tracking verify it via SNI. ClusterIP DNS: shipment:9090.
apiVersion: v1
kind: Service
metadata:
  name: shipment
  labels:
    app: shipment
spec:
  selector:
    app: shipment
  ports:
    - { name: grpc, port: 9090, targetPort: grpc }
    - { name: mgmt, port: 8081, targetPort: mgmt }
