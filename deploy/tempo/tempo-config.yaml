# Tempo 2.5 single-binary config — local dev backend.
# Receives OTLP/gRPC on :4317 and OTLP/HTTP on :4318, stores blocks on
# the filesystem under /var/tempo. No auth, no replication — matches the
# Loki pattern for training scope.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
