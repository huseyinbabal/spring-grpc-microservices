name: image-tracking

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "services/tracking/**"
      - "common-grpc/**"
      - "proto-gen/**"
      - "proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "pom.xml"
      - ".dockerignore"
      - ".github/workflows/image-tracking.yml"
  workflow_dispatch:

concurrency:
  group: image-tracking-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build + push cargo-tracking
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/cargo-tracking
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/tracking/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=tracking
          cache-to: type=gha,mode=max,scope=tracking
