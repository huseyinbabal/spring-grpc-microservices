spring:
  application:
    name: shipment
  main:
    # No web layer — this service only speaks gRPC.
    web-application-type: none

  datasource:
    url: ${SHIPMENT_DB_URL:jdbc:postgresql://localhost:5432/shipment}
    username: ${SHIPMENT_DB_USER:shipment}
    password: ${SHIPMENT_DB_PASSWORD:shipment}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: 9090
    # Enable the gRPC reflection service so `grpcurl list` works
    # during development. Disable in production profiles.
    reflection-service-enabled: true

management:
  tracing:
    sampling:
      # 100% sampling — training repo, low volume. Revisit before
      # shipping to a real environment.
      probability: 1.0
  otlp:
    tracing:
      # Spring Boot 3.3's OTLP tracing auto-config speaks OTLP/HTTP only
      # (gRPC transport landed in 3.4). Tempo exposes that on :4318.
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        # Actuator pulled in for tracing auto-config; leave web endpoints
        # closed — this service is gRPC-only (web-application-type: none).
        exclude: "*"
