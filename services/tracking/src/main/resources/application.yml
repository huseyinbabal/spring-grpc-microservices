spring:
  application:
    name: tracking
  main:
    web-application-type: none

  datasource:
    url: ${TRACKING_DB_URL:jdbc:postgresql://localhost:5432/tracking}
    username: ${TRACKING_DB_USER:tracking}
    password: ${TRACKING_DB_PASSWORD:tracking}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # Opens a Micrometer observation around each KafkaListener
      # invocation — extracts W3C traceparent from message headers so
      # the consumer span links to the producing service's trace.
      observation-enabled: true

grpc:
  server:
    port: 9090
    reflection-service-enabled: true

cargo:
  tracking:
    shipment-target: ${SHIPMENT_GRPC_TARGET:shipment:9090}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        exclude: "*"
