grpc:
  server:
    # Mirror services/shipment's test config: disable the TCP gRPC
    # listener by default so non-grpc ITs don't fight over port 9090
    # when Testcontainers per-class contexts accumulate in the Spring
    # TestContext cache. Tests that need an in-process gRPC server
    # override `grpc.server.in-process-name` in their own
    # @TestPropertySource.
    port: -1
