grpc:
  server:
    port: -1
    # In-process transport has no wire — mTLS off for tests.
    security:
      enabled: false

cargo:
  tracking:
    # Tracking -> Shipment client uses a plaintext in-process / loopback
    # channel in tests; production builds a mutual-TLS Netty channel.
    tls:
      enabled: false

spring:
  autoconfigure:
    # Disable Kafka auto-config by default for tests. This prevents
    # non-Kafka ITs (ReportLocationIT, GetTrackingIT, etc.) from
    # spinning up a KafkaConsumer that hammers localhost:9092 and
    # causes rebalance churn when ShipmentEventsConsumerIT runs its
    # own Kafka container on a different port. The consumer IT
    # re-enables auto-config via @TestPropertySource.
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
