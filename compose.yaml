---
# Cargo tracking platform — local/dev deployment stack.
#
# Brings up the shared infrastructure the three Spring Boot services
# depend on. Per-service Postgres instances and the service containers
# themselves are added in their own PRs (Phase 2c / 3d / 4b).
#
# Usage:
#   docker compose up -d                 # start stack
#   docker compose ps                    # see what's running
#   docker compose logs -f kafka         # tail a service
#   docker compose down                  # stop + remove containers
#   docker compose down -v               # also wipe volumes (full reset)

name: cargo

networks:
  cargo:
    name: cargo

volumes:
  kafka-data:

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: cargo-kafka
    restart: unless-stopped
    networks: [cargo]
    ports:
      - "9092:9092"   # external listener for host-side clients / tests
    environment:
      # Single-node KRaft mode — no Zookeeper.
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
