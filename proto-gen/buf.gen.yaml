---
# Maven-driven buf generate template. Called from proto-gen's pom.xml
# during generate-sources. `buf generate` is invoked from the repo
# root so `out:` paths are resolved relative to there.
version: v2
plugins:
  # Pinned so generated code stays reproducible. The protobuf gencode
  # version MUST stay <= the protobuf-java runtime (${protobuf.version}
  # in the parent pom) — an unpinned plugin drifts to a newer gencode
  # and fails at runtime with a Gencode/Runtime mismatch.
  - remote: buf.build/protocolbuffers/java:v34.1
    out: proto-gen/target/generated-sources/proto-gen
  - remote: buf.build/grpc/java:v1.80.0
    out: proto-gen/target/generated-sources/proto-gen
